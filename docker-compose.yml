# SQL Server para la prueba técnica RedLab (misma contraseña que appsettings.json)
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_RedLab
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Password2424"
    ports:
      - "1433:1433"
    volumes:
      - sql_redlab_data:/var/opt/mssql

volumes:
  sql_redlab_data:
